name: Midnight Daily Check-in

on:
  schedule:
    # 12:00 PM EDT (UTC-4), Mon-Fri only (no weekend messages per user preference).
    # Change to "0 17 * * 1-5" Nov-Mar for noon EST.
    - cron: '0 16 * * 1-5'
  workflow_dispatch:

concurrency:
  group: daily-checkin
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 245

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send daily question and await reply
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          USER_NAME: ${{ secrets.USER_NAME }}
          PARTNER_NAME: ${{ secrets.PARTNER_NAME }}
          CONTEXT_BRIEF: ${{ secrets.CONTEXT_BRIEF }}
        run: |
          python3 -u -c "
          import os, json, time
          from datetime import datetime, timezone
          from urllib import request as req, parse

          TOKEN   = os.environ['TELEGRAM_TOKEN']
          AKEY    = os.environ['ANTHROPIC_API_KEY']
          CHAT    = os.environ['CHAT_ID']
          USER    = os.environ.get('USER_NAME', 'friend')
          PARTNER = os.environ.get('PARTNER_NAME', 'their partner')
          BASE    = 'https://api.telegram.org/bot' + TOKEN

          CATS = {
              0: ('Physical features and style',
                  f'Ask about how {PARTNER} or {USER} typically looks or dresses.'),
              1: ('Personality traits and quirks',
                  f'Ask about a specific personality quirk or endearing habit of {PARTNER}.'),
              2: ('Favorite foods and restaurants',
                  'Ask about a specific food, dish, or restaurant memory.'),
              3: ('Travel adventures and dream destinations',
                  'Ask about a specific trip they took or a dream destination.'),
              4: ('Inside jokes and shared memories',
                  'Ask about a funny moment or inside joke only they would understand.'),
              5: ('Love languages and affection',
                  'Ask how one of them shows love in a small specific way.'),
              6: ('Firsts together and future dreams',
                  'Ask about one of their firsts as a couple or a shared future dream.'),
          }

          day = datetime.now(timezone.utc).weekday()
          cat, hint = CATS[day]
          today_str = datetime.now(timezone.utc).strftime('%Y-%m-%d')

          def api(method, params=None):
              data = parse.urlencode(params or {}).encode()
              r = req.Request(f'{BASE}/{method}', data=data or None)
              return json.loads(req.urlopen(r, timeout=15).read())

          def send(text):
              api('sendMessage', {'chat_id': CHAT, 'text': text})

          def send_keyboard(text, buttons):
              api('sendMessage', {
                  'chat_id': CHAT, 'text': text,
                  'reply_markup': json.dumps({'inline_keyboard': buttons})
              })

          def answer_callback(cq_id, text=None):
              params = {'callback_query_id': cq_id}
              if text: params['text'] = text
              api('answerCallbackQuery', params)

          QUESTION_BUTTONS = [[
              {'text': '🔄 Ask something else', 'callback_data': 'regenerate'},
              {'text': '⏭️ Skip today', 'callback_data': 'skip_checkin'}
          ]]
          SKIP_WORDS = {'skip', 'skip today', 'not today', 'pass', 'no thanks', 'not now'}

          # --- Health check: fail loudly instead of silently degrading for hours ---
          try:
              me = api('getMe')
              if not me.get('ok'):
                  raise RuntimeError(str(me))
              print('Bot check OK:', me['result'].get('username'))
          except Exception as e:
              print('FATAL: Telegram bot token check failed:', e)
              summary = os.environ.get('GITHUB_STEP_SUMMARY')
              if summary:
                  with open(summary, 'a') as f:
                      f.write('## Midnight daily check-in FAILED\n\nBot token check failed: ' + str(e) + '\n')
              raise SystemExit(1)

          # --- Load context brief (best effort, set by the local interactive agent as a secret — never committed to the repo) ---
          context_note = os.environ.get('CONTEXT_BRIEF', '').strip()

          # --- Load recently-asked questions (avoid repeats), keep last log line for recovery ---
          log_lines_raw = []
          if os.path.exists('context/asked_questions.log'):
              with open('context/asked_questions.log') as f:
                  log_lines_raw = [l.strip() for l in f if ': ' in l]
          recent_questions = [l.split(': ', 1)[1].strip() for l in log_lines_raw][-10:]

          def generate_question(avoid_extra=None):
              avoid_list = list(recent_questions)
              if avoid_extra:
                  avoid_list.append(avoid_extra)
              avoid_clause = ''
              if avoid_list:
                  joined = ' | '.join(avoid_list[-10:])
                  avoid_clause = ' Avoid repeating or closely resembling any of these recent questions: ' + joined + '.'
              context_clause = ' Relevant context about them: ' + context_note if context_note else ''
              try:
                  payload = json.dumps({
                      'model': 'claude-haiku-4-5-20251001',
                      'max_tokens': 120,
                      'messages': [{'role': 'user', 'content':
                          f'You are Midnight, warm relationship memory keeper for {USER} and {PARTNER}. '
                          f'Category: {cat}. Hint: {hint}.{context_clause}{avoid_clause} '
                          f'Write ONE warm specific curious question to ask {USER}. '
                          'Return only the question, no quotes, nothing else.'
                      }]
                  }).encode()
                  r = req.Request('https://api.anthropic.com/v1/messages', data=payload, headers={
                      'x-api-key': AKEY,
                      'anthropic-version': '2023-06-01',
                      'content-type': 'application/json'
                  })
                  return json.loads(req.urlopen(r, timeout=15).read())['content'][0]['text'].strip()
              except Exception as e:
                  print('Claude error:', e)
                  return f'What is one small thing {PARTNER} does that makes your day better without them even knowing it?'

          # --- Resume from last processed update, recovering any late reply that missed its window ---
          offset = None
          if os.path.exists('context/last_offset.txt'):
              try:
                  offset = int(open('context/last_offset.txt').read().strip())
              except Exception:
                  offset = None

          last_question = None
          last_category = '(previous day)'
          if log_lines_raw:
              date_part, q_part = log_lines_raw[-1].split(': ', 1)
              last_question = q_part.strip()
              try:
                  d = datetime.strptime(date_part.strip(), '%Y-%m-%d')
                  last_category = CATS[d.weekday()][0]
              except Exception:
                  pass

          if offset is not None:
              try:
                  pending = api('getUpdates', {'offset': offset, 'timeout': 0}).get('result', [])
              except Exception as e:
                  print('Late-reply check error:', e)
                  pending = []
              late_reply = ''
              for u in pending:
                  offset = u['update_id'] + 1
                  m = u.get('message', {})
                  if str(m.get('chat', {}).get('id', '')) == CHAT:
                      t = m.get('text', '').strip()
                      if t and not t.startswith('[MIDNIGHT LOG') and t.lower() not in SKIP_WORDS:
                          late_reply = t
              if late_reply and last_question:
                  print('Recovered late reply for previous question:', late_reply)
                  send('Just caught your reply from before - logging it now.')
                  send('[MIDNIGHT LOG] ' + today_str + '\n\nCategory: ' + last_category + '\nQ: ' + last_question + '\nA: ' + late_reply)
          else:
              try:
                  results = api('getUpdates', {'limit': 100}).get('result', [])
                  offset = results[-1]['update_id'] + 1 if results else 0
              except Exception as e:
                  print('Offset error:', e)
                  offset = 0

          # --- Ask today's question ---
          question = generate_question()
          print('Q:', question)

          send_keyboard(
              'Good morning! Here\'s today\'s question:\n\n' + question + '\n\nTake your time - reply whenever you\'re ready, or tap a button below.',
              QUESTION_BUTTONS
          )
          print('Sent. Polling up to 4 hours...')

          reply = ''
          skipped = False
          regenerate_count = 0
          MAX_REGENERATE = 4
          deadline = time.time() + 4 * 3600

          while time.time() < deadline:
              try:
                  updates = api('getUpdates', {'offset': offset, 'timeout': 20})
              except Exception as e:
                  print('Poll error:', e)
                  time.sleep(3)
                  continue

              for u in updates.get('result', []):
                  offset = u['update_id'] + 1

                  cq = u.get('callback_query')
                  if cq and str(cq.get('message', {}).get('chat', {}).get('id', '')) == CHAT:
                      data = cq.get('data', '')
                      if data == 'skip_checkin':
                          answer_callback(cq['id'], 'Okay, catching you tomorrow!')
                          skipped = True
                          break
                      if data == 'regenerate':
                          if regenerate_count >= MAX_REGENERATE:
                              answer_callback(cq['id'], 'That\'s all I\'ve got for today.')
                              continue
                          regenerate_count += 1
                          answer_callback(cq['id'], 'Here\'s another one!')
                          question = generate_question(avoid_extra=question)
                          print('Q (regenerated):', question)
                          send_keyboard(
                              'Sure - how about this:\n\n' + question + '\n\nTake your time - reply whenever you\'re ready, or tap a button below.',
                              QUESTION_BUTTONS
                          )
                          continue

                  m = u.get('message', {})
                  if str(m.get('chat', {}).get('id', '')) == CHAT:
                      t = m.get('text', '').strip()
                      if t and not t.startswith('[MIDNIGHT LOG'):
                          if t.lower() in SKIP_WORDS:
                              skipped = True
                          else:
                              reply = t
                          break

              if reply or skipped:
                  print('Reply:', reply if reply else '(skipped)')
                  break

          if reply:
              send('Love that. Keeping that safe for us.')
              send('[MIDNIGHT LOG] ' + today_str + '\n\nCategory: ' + cat + '\nQ: ' + question + '\nA: ' + reply)
              print('Logged.')
          elif skipped:
              send('No worries - catch you tomorrow with a fresh question.')
              print('Skipped by user.')
          else:
              send('No worries - catch you tomorrow with a fresh question.')
              print('No reply after 4 hours.')

          # --- Persist context for next run ---
          os.makedirs('context', exist_ok=True)
          new_log_lines = [l + '\n' for l in log_lines_raw]
          new_log_lines.append(today_str + ': ' + question + '\n')
          new_log_lines = new_log_lines[-20:]
          with open('context/asked_questions.log', 'w') as f:
              f.writelines(new_log_lines)

          with open('context/last_offset.txt', 'w') as f:
              f.write(str(offset))

          print('Context persisted. offset=' + str(offset))
          "

      - name: Persist check-in context back to repo
        if: always()
        run: |
          if [ -n "$(git status --porcelain context/ 2>/dev/null)" ]; then
            git config user.name "midnight-bot"
            git config user.email "midnight-bot@users.noreply.github.com"
            git add context/asked_questions.log context/last_offset.txt
            git commit -m "Update check-in context [skip ci]"
            git push
          else
            echo "No context changes to commit"
          fi
